<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Roanoke Junk Removal – Book a Service</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Karla:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Karla',sans-serif;background:#f8faf8;min-height:100vh;padding:24px 16px;}
h1{font-family:'Barlow Condensed',sans-serif;}
h2{font-family:'Barlow Condensed',sans-serif;font-size:22px;color:#2D6A2D;margin-bottom:20px;}
.card{background:#fff;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,0.07);padding:28px 24px;max-width:600px;margin:0 auto;}
.header{text-align:center;margin-bottom:28px;}
.header h1{font-size:26px;color:#1a1a1a;}
.header p{color:#6b7280;font-size:14px;margin-top:4px;}
.logo{background:#2D6A2D;border-radius:10px;padding:6px 12px;display:inline-block;font-size:22px;margin-bottom:8px;}
label{display:block;font-size:13px;font-weight:600;color:#1a1a1a;margin-bottom:5px;}
input,select,textarea{width:100%;padding:10px 14px;border-radius:8px;border:1.5px solid #d1d5db;font-family:'Karla',sans-serif;font-size:14px;color:#1a1a1a;outline:none;background:#fff;transition:border 0.2s,box-shadow 0.2s;}
input:focus,select:focus,textarea:focus{border-color:#2D6A2D;box-shadow:0 0 0 3px #f0f7f0;}
.field{margin-bottom:16px;}
.field .hint{font-size:12px;color:#6b7280;margin-bottom:5px;}
.field .err{color:#dc2626;font-size:12px;margin-top:4px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.btn{padding:12px 24px;border-radius:8px;border:none;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;letter-spacing:0.05em;cursor:pointer;transition:filter 0.2s;}
.btn:hover{filter:brightness(0.93);}
.btn-green{background:#2D6A2D;color:#fff;}
.btn-orange{background:#e8680a;color:#fff;box-shadow:0 4px 14px rgba(232,104,10,0.35);}
.btn-gray{background:#fff;color:#6b7280;border:1.5px solid #d1d5db!important;font-family:'Karla',sans-serif;font-size:14px;font-weight:600;}
.btn-nav{display:flex;justify-content:space-between;margin-top:28px;gap:12px;}
.option-btn{padding:14px 16px;border:2px solid #d1d5db;border-radius:10px;background:#fff;cursor:pointer;text-align:left;display:flex;align-items:center;gap:12px;width:100%;margin-bottom:10px;transition:all 0.2s;font-family:'Karla',sans-serif;}
.option-btn.selected{border-color:#2D6A2D;background:#f0f7f0;}
.option-btn .radio{width:20px;height:20px;border-radius:50%;border:2px solid #d1d5db;background:#fff;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.option-btn.selected .radio{border-color:#2D6A2D;background:#2D6A2D;}
.option-btn.selected .radio::after{content:'';width:8px;height:8px;border-radius:50%;background:#fff;display:block;}
.option-btn .otitle{font-weight:700;font-size:15px;color:#1a1a1a;}
.option-btn .odesc{font-size:12px;color:#6b7280;}
.size-btn{padding:16px 12px;border:2px solid #d1d5db;border-radius:10px;background:#fff;cursor:pointer;text-align:center;transition:all 0.2s;font-family:'Karla',sans-serif;}
.size-btn.selected{border-color:#2D6A2D;background:#f0f7f0;}
.size-btn .stitle{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;color:#1a1a1a;}
.size-btn.selected .stitle{color:#2D6A2D;}
.size-btn .sdesc{font-size:11px;color:#6b7280;margin-top:4px;}
.day-btn{padding:14px 8px;border:2px solid #d1d5db;border-radius:10px;background:#fff;cursor:pointer;text-align:center;transition:all 0.2s;font-family:'Karla',sans-serif;}
.day-btn.selected{border-color:#2D6A2D;background:#f0f7f0;}
.day-btn .dnum{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;color:#1a1a1a;}
.day-btn.selected .dnum{color:#2D6A2D;}
.day-btn .dlabel{font-size:11px;color:#6b7280;}
.day-btn .dprice{font-size:13px;font-weight:700;color:#e8680a;margin-top:4px;}
.notice{border-radius:10px;padding:12px 16px;font-size:13px;line-height:1.6;}
.notice-green{background:#f0f7f0;color:#1a4a1a;}
.notice-yellow{background:#fffbeb;border:1px solid #fcd34d;color:#92400e;}
.steps{display:flex;align-items:center;justify-content:center;margin-bottom:28px;}
.step-dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;font-family:'Barlow Condensed',sans-serif;transition:all 0.3s;}
.step-dot.done{background:#2D6A2D;color:#fff;}
.step-dot.active{background:#2D6A2D;color:#fff;box-shadow:0 0 0 4px #f0f7f0;}
.step-dot.todo{background:#e5e7eb;color:#9ca3af;}
.step-line{width:20px;height:2px;margin:0 4px;transition:all 0.3s;}
.step-line.done{background:#2D6A2D;}
.step-line.todo{background:#e5e7eb;}
.step-label{font-size:11px;margin:0 6px 0 4px;}
.review-row{display:flex;padding:10px 0;border-bottom:1px solid #f4f4f4;gap:12px;}
.review-row .rl{font-size:13px;color:#6b7280;width:120px;flex-shrink:0;}
.review-row .rv{font-size:14px;color:#1a1a1a;font-weight:500;}
.review-row .rv.hi{color:#2D6A2D;font-weight:700;}
.photo-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
.photo-thumb{position:relative;}
.photo-thumb img{width:64px;height:64px;object-fit:cover;border-radius:8px;border:1px solid #d1d5db;}
.photo-thumb .del{position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:#dc2626;border:none;color:#fff;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;}
.upload-zone{border:2px dashed #d1d5db;border-radius:10px;padding:18px 16px;text-align:center;cursor:pointer;color:#6b7280;font-size:13px;background:#fafafa;}
.upload-zone:hover{border-color:#2D6A2D;background:#f0f7f0;}
.success{max-width:500px;margin:0 auto;padding:48px 16px;text-align:center;}
.success .check{width:72px;height:72px;border-radius:50%;background:#2D6A2D;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:36px;box-shadow:0 8px 24px rgba(45,106,45,0.3);}
.hidden{display:none;}
/* Admin */
.tabs{display:flex;gap:4px;background:#f4f4f4;padding:4px;border-radius:10px;margin-bottom:24px;}
.tab-btn{flex:1;padding:10px 8px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:500;font-family:'Karla',sans-serif;transition:all 0.2s;background:transparent;color:#6b7280;}
.tab-btn.active{background:#fff;color:#2D6A2D;font-weight:700;box-shadow:0 2px 8px rgba(0,0,0,0.08);}
.booking-card{background:#fff;border-radius:12px;border:1px solid #d1d5db;overflow:hidden;margin-bottom:12px;}
.booking-header{padding:14px 18px;cursor:pointer;display:flex;align-items:center;gap:12px;}
.booking-body{border-top:1px solid #d1d5db;padding:16px 18px;background:#fafafa;}
.badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;text-transform:capitalize;}
.badge-pending{background:#fffbeb;color:#d97706;}
.badge-confirmed{background:#f0f7f0;color:#2D6A2D;}
.badge-cancelled{background:#fef2f2;color:#dc2626;}
.badge-completed{background:#f9fafb;color:#6b7280;}
.filter-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.filter-btn{padding:6px 14px;border-radius:20px;border:1.5px solid #d1d5db;background:#fff;color:#6b7280;font-weight:600;font-size:12px;cursor:pointer;font-family:'Karla',sans-serif;text-transform:capitalize;}
.filter-btn.active{border-color:#2D6A2D;background:#f0f7f0;color:#2D6A2D;}
.action-btn{padding:8px 16px;border-radius:8px;border:none;color:#fff;font-weight:700;font-size:13px;cursor:pointer;font-family:'Karla',sans-serif;margin-right:6px;margin-top:4px;}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px;}
.stat-card{background:#fff;border-radius:12px;padding:16px;border:1px solid #d1d5db;text-align:center;}
.stat-num{font-family:'Barlow Condensed',sans-serif;font-size:36px;font-weight:800;line-height:1;}
.stat-label{font-size:12px;color:#6b7280;margin-top:4px;}
.fleet-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;}
.fleet-item{text-align:center;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-day{padding:8px 4px;border-radius:8px;text-align:center;min-height:52px;border:1px solid #f3f4f6;}
.cal-day.today{border:2px solid #2D6A2D;background:#f0f7f0;}
.cal-day.past{background:#f9fafb;}
@media(max-width:480px){.grid2{grid-template-columns:1fr;}.step-label{display:none;}}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ── DATA ───────────────────────────────────────────────────────────────────
const ADMIN_PW="RoanokeJunk2024!";
const TOTAL=7;
const PRICING={"15yd":{"1":300,"2":350,"7":375},"20yd":{"1":360,"2":390,"7":430}};
const SIZES=[{id:"15yd",label:"15 Yard",desc:"Great for small cleanouts, garage, single room"},{id:"20yd",label:"20 Yard",desc:"Perfect for larger projects, full home cleanouts"}];
const RENTAL_DAYS=[{d:1,l:"1 Day"},{d:2,l:"2 Days"},{d:7,l:"7 Days"}];
const SERVICES=["Junk Removal","Dumpster Rental","Quote Request"];
const SERVICE_DESC={"Junk Removal":"We haul it all away — furniture, appliances, debris & more","Dumpster Rental":"We drop off a dumpster, you fill it, we pick it up","Quote Request":"Not sure what you need? Get a free estimate, no commitment"};
const REFERRALS=["Google Search","Facebook","Neighbor / Friend","Drove by","Other"];
const TIME_SLOTS=[{v:"8am-10am",l:"8:00 AM – 10:00 AM"},{v:"10am-12pm",l:"10:00 AM – 12:00 PM"},{v:"12pm-2pm",l:"12:00 PM – 2:00 PM"},{v:"2pm-4pm",l:"2:00 PM – 4:00 PM"},{v:"4pm-6pm",l:"4:00 PM – 6:00 PM"},{v:"flexible",l:"Flexible — any time works"}];

// ── STORAGE ────────────────────────────────────────────────────────────────
function load(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):[];}catch{return[];}}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

let rentals=load("rjr-rentals");
let bookings=load("rjr-bookings");

// ── HELPERS ────────────────────────────────────────────────────────────────
function todayStr(){return new Date().toISOString().split("T")[0];}
function addDays(d,n){const dt=new Date(d);dt.setDate(dt.getDate()+n);return dt.toISOString().split("T")[0];}
function fmtDate(d){if(!d)return"—";return new Date(d+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});}
function overlap(s1,e1,s2,e2){return s1<=e2&&e1>=s2;}
function getAvail(date){
  const out=rentals.filter(r=>r.status!=="cancelled"&&r.status!=="returned"&&overlap(r.startDate,r.endDate,date,date)).length;
  return TOTAL-out;
}
function el(tag,attrs,children){
  const elem=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==="class")elem.className=v;
    else if(k==="style")elem.style.cssText=v;
    else if(k.startsWith("on"))elem.addEventListener(k.slice(2).toLowerCase(),v);
    else elem.setAttribute(k,v);
  });
  if(children){
    (Array.isArray(children)?children:[children]).forEach(c=>{
      if(c===null||c===undefined)return;
      elem.appendChild(typeof c==="string"?document.createTextNode(c):c);
    });
  }
  return elem;
}
function div(cls,children,style){return el("div",{class:cls,...(style?{style}:{})},children);}
function render(content){const app=document.getElementById("app");app.innerHTML="";app.appendChild(content);}

// ── STEPS ──────────────────────────────────────────────────────────────────
function makeSteps(current,labels){
  const wrap=div("steps");
  labels.forEach((lbl,i)=>{
    const dot=div(i<current?"step-dot done":i===current?"step-dot active":"step-dot todo",[String(i<current?"✓":i+1)]);
    const span=el("span",{class:`step-label`,style:`color:${i<=current?"#2D6A2D":"#6b7280"}`},[lbl]);
    wrap.appendChild(dot);
    wrap.appendChild(span);
    if(i<labels.length-1){
      wrap.appendChild(div(`step-line ${i<current?"done":"todo"}`));
    }
  });
  return wrap;
}

// ── FIELD BUILDER ──────────────────────────────────────────────────────────
function makeField(label,required,hint,inputEl,errId){
  const wrap=div("field");
  const lbl=el("label",{},[label+(required?" *":"")]);
  if(required)lbl.querySelector||lbl.insertAdjacentHTML("beforeend","");
  wrap.appendChild(lbl);
  if(hint){const h=div("hint",[hint]);wrap.appendChild(h);}
  wrap.appendChild(inputEl);
  const errDiv=div("err hidden");
  errDiv.id=errId||"";
  wrap.appendChild(errDiv);
  return wrap;
}
function makeInput(id,type,placeholder,value){
  const inp=el("input",{type,placeholder,id,value:value||""});
  return inp;
}
function makeSelect(id,options,value,placeholder){
  const sel=el("select",{id});
  sel.appendChild(el("option",{value:""},[placeholder||"Select..."]));
  options.forEach(o=>{
    const opt=el("option",{value:o.v||o},[o.l||o]);
    if((o.v||o)===value)opt.selected=true;
    sel.appendChild(opt);
  });
  return sel;
}
function makeTextarea(id,placeholder,value){
  const ta=el("textarea",{id,placeholder,rows:"4",style:"resize:vertical;"},[value||""]);
  return ta;
}

// ── FORM STATE ─────────────────────────────────────────────────────────────
let form={name:"",phone:"",email:"",address:"",service:"",dumpsterSize:"",rentalDays:"",preferredDate:"",preferredTime:"",referral:"",notes:"",photos:[]};
let step=0;

function getForm(){
  ["name","phone","email","address","referral","notes","preferredDate","preferredTime"].forEach(k=>{
    const el=document.getElementById("f_"+k);
    if(el&&el.value!==undefined)form[k]=el.value;
  });
}

function showErr(id,msg){
  const el=document.getElementById("err_"+id);
  if(el){el.textContent=msg;el.classList.remove("hidden");}
}
function clearErrs(){
  document.querySelectorAll(".err").forEach(e=>e.classList.add("hidden"));
}

function validate(){
  getForm();
  clearErrs();
  let ok=true;
  if(step===0){
    if(!form.name.trim()){showErr("name","Name is required");ok=false;}
    if(!form.phone.trim()){showErr("phone","Phone is required");ok=false;}
    if(!form.email.trim()){showErr("email","Email is required");ok=false;}
    else if(!/\S+@\S+\.\S+/.test(form.email)){showErr("email","Enter a valid email");ok=false;}
    if(!form.address.trim()){showErr("address","Address is required");ok=false;}
  }
  if(step===1){
    if(!form.service){showErr("service","Please select a service");ok=false;}
    if(form.service==="Dumpster Rental"&&!form.dumpsterSize){showErr("dumpsterSize","Please select a size");ok=false;}
    if(form.service==="Dumpster Rental"&&!form.rentalDays){showErr("rentalDays","Please select a rental period");ok=false;}
  }
  if(step===2){
    if(!form.preferredDate){showErr("preferredDate","Please select a date");ok=false;}
    if(!form.preferredTime){showErr("preferredTime","Please select a time");ok=false;}
  }
  return ok;
}

// ══════════════════════════════════════════════════════════════════════════
// STEP 0 — CONTACT
// ══════════════════════════════════════════════════════════════════════════
function renderStep0(){
  const wrap=document.createDocumentFragment();
  wrap.appendChild(el("h2",{},["YOUR CONTACT INFO"]));
  wrap.appendChild(makeField("Full Name",true,null,makeInput("f_name","text","Jane Smith",form.name),"err_name"));
  const g=div("grid2");
  g.appendChild(makeField("Phone Number",true,null,makeInput("f_phone","tel","(540) 555-1234",form.phone),"err_phone"));
  g.appendChild(makeField("Email Address",true,null,makeInput("f_email","email","jane@email.com",form.email),"err_email"));
  wrap.appendChild(g);
  wrap.appendChild(makeField("Service Address",true,"Where do you need us to come?",makeInput("f_address","text","123 Main St, Roanoke, VA 24017",form.address),"err_address"));
  wrap.appendChild(makeField("How did you hear about us?",false,null,makeSelect("f_referral",REFERRALS.map(r=>({v:r,l:r})),form.referral,"Select one...")));
  return wrap;
}

// ══════════════════════════════════════════════════════════════════════════
// STEP 1 — SERVICE
// ══════════════════════════════════════════════════════════════════════════
function renderStep1(){
  const wrap=document.createDocumentFragment();
  wrap.appendChild(el("h2",{},["SELECT YOUR SERVICE"]));

  // Services
  const svcField=div("field");
  svcField.appendChild(el("label",{},["What can we help you with? *"]));
  SERVICES.forEach(s=>{
    const btn=div(`option-btn${form.service===s?" selected":""}`);
    btn.setAttribute("data-svc",s);
    const radio=div("radio");
    const info=div("","");
    info.appendChild(el("div",{class:"otitle"},[s]));
    info.appendChild(el("div",{class:"odesc"},[SERVICE_DESC[s]]));
    btn.appendChild(radio);btn.appendChild(info);
    btn.addEventListener("click",()=>{
      form.service=s;
      if(s!=="Dumpster Rental"){form.dumpsterSize="";form.rentalDays="";}
      renderCustomerView();
    });
    svcField.appendChild(btn);
  });
  const svcErr=div("err hidden");svcErr.id="err_service";
  svcField.appendChild(svcErr);
  wrap.appendChild(svcField);

  // Dumpster options
  if(form.service==="Dumpster Rental"){
    // Size
    const sizeField=div("field");
    sizeField.appendChild(el("label",{},["Dumpster Size *"]));
    
    const sg=div("grid2");
    SIZES.forEach(sz=>{
      const btn=div(`size-btn${form.dumpsterSize===sz.id?" selected":""}`);
      btn.appendChild(el("div",{class:"stitle"},[sz.label]));
      btn.appendChild(el("div",{class:"sdesc"},[sz.desc]));
      btn.addEventListener("click",()=>{form.dumpsterSize=sz.id;renderCustomerView();});
      sg.appendChild(btn);
    });
    sizeField.appendChild(sg);
    const szErr=div("err hidden");szErr.id="err_dumpsterSize";
    sizeField.appendChild(szErr);
    wrap.appendChild(sizeField);

    // Days
    const daysField=div("field");
    daysField.appendChild(el("label",{},["Rental Period *"]));
    const dg=div("grid3");
    RENTAL_DAYS.forEach(opt=>{
      const p=form.dumpsterSize?PRICING[form.dumpsterSize]?.[String(opt.d)]:null;
      const btn=div(`day-btn${form.rentalDays===String(opt.d)?" selected":""}`);
      btn.appendChild(el("div",{class:"dnum"},[String(opt.d)]));
      btn.appendChild(el("div",{class:"dlabel"},[opt.d===1?"Day":"Days"]));
      if(p)btn.appendChild(el("div",{class:"dprice"},["$"+p]));
      btn.addEventListener("click",()=>{form.rentalDays=String(opt.d);renderCustomerView();});
      dg.appendChild(btn);
    });
    daysField.appendChild(dg);
    const dErr=div("err hidden");dErr.id="err_rentalDays";
    daysField.appendChild(dErr);
    wrap.appendChild(daysField);

    // Price notice
    const price=form.dumpsterSize&&form.rentalDays?PRICING[form.dumpsterSize]?.[form.rentalDays]:null;
    if(price){
      wrap.appendChild(div("notice notice-yellow",["💰 Estimated cost: ",el("strong",{},["$"+price]),". Final price confirmed when we call you."]));
    }
  }

  // Notes
  const notesWrap=div("field",""," margin-top:16px");
  notesWrap.style.marginTop="16px";
  notesWrap.appendChild(el("label",{},["Tell us what needs to go (optional)"]));
  notesWrap.appendChild(el("p",{class:"hint"},["The more detail, the better we can prepare!"]));
  notesWrap.appendChild(makeTextarea("f_notes","E.g. old couch, refrigerator, full garage cleanout...",form.notes));
  wrap.appendChild(notesWrap);

  // Photos
  const photoField=div("field");
  photoField.appendChild(el("label",{},["Upload Photos (optional)"]));
  photoField.appendChild(el("p",{class:"hint"},["Photos help us give you a more accurate quote"]));
  const zone=div("upload-zone",["📷  Click to upload photos"]);
  const fileIn=el("input",{type:"file",accept:"image/*",multiple:"true",style:"display:none",id:"photoInput"});
  fileIn.addEventListener("change",ev=>{
    Array.from(ev.target.files).forEach(file=>{
      const reader=new FileReader();
      reader.onload=e=>{form.photos.push({name:file.name,url:e.target.result});renderCustomerView();};
      reader.readAsDataURL(file);
    });
  });
  zone.addEventListener("click",()=>fileIn.click());
  photoField.appendChild(zone);
  photoField.appendChild(fileIn);
  if(form.photos.length){
    const pg=div("photo-grid");
    form.photos.forEach((p,i)=>{
      const thumb=div("photo-thumb");
      thumb.appendChild(el("img",{src:p.url,alt:p.name}));
      const del=div("del",["×"]);
      del.addEventListener("click",ev=>{ev.stopPropagation();form.photos.splice(i,1);renderCustomerView();});
      thumb.appendChild(del);
      pg.appendChild(thumb);
    });
    photoField.appendChild(pg);
  }
  wrap.appendChild(photoField);
  return wrap;
}

// ══════════════════════════════════════════════════════════════════════════
// STEP 2 — SCHEDULE
// ══════════════════════════════════════════════════════════════════════════
function renderStep2(){
  const wrap=document.createDocumentFragment();
  wrap.appendChild(el("h2",{},["PICK A PREFERRED DATE & TIME"]));
  wrap.appendChild(el("p",{style:"font-size:13px;color:#6b7280;margin-bottom:20px;line-height:1.6;"},
    ["We'll do our best to accommodate your request. We'll call or text you within ",el("strong",{},["2 hours"])," to confirm — dates and times may need to be adjusted based on availability."]));
  wrap.appendChild(makeField("Preferred Date",true,null,makeInput("f_preferredDate","date","",form.preferredDate),"err_preferredDate"));
  wrap.appendChild(makeField("Preferred Time Window",true,null,makeSelect("f_preferredTime",TIME_SLOTS.map(t=>({v:t.v,l:t.l})),form.preferredTime,"Select a time window..."),"err_preferredTime"));

      body.appendChild(actions);
      card.appendChild(body);
    }
    wrap.appendChild(card);
  });
  return wrap;
}

    if(r.customerPhone)sub.appendChild(el("span",{},["📞 "+r.customerPhone]));
    info.appendChild(sub);card.appendChild(info);
    const btns=el("div",{style:"display:flex;gap:6px;flex-shrink:0;"});
    const retBtn=el("button",{style:"padding:6px 12px;border-radius:8px;border:none;background:#2D6A2D;color:#fff;font-weight:600;font-size:12px;cursor:pointer;"},["✓ Returned"]);
    retBtn.addEventListener("click",()=>{rentals=rentals.map(x=>x.id===r.id?{...x,status:"returned"}:x);save("rjr-rentals",rentals);renderAdminView();});
    const canBtn=el("button",{style:"padding:6px 10px;border-radius:8px;border:1px solid #d1d5db;background:#fff;color:#dc2626;font-weight:600;font-size:12px;cursor:pointer;"},["✗"]);
    canBtn.addEventListener("click",()=>{rentals=rentals.map(x=>x.id===r.id?{...x,status:"cancelled"}:x);save("rjr-rentals",rentals);renderAdminView();});
    btns.appendChild(retBtn);btns.appendChild(canBtn);card.appendChild(btns);
    wrap.appendChild(card);
  });
  return wrap;
}

// ── CALENDAR TAB ───────────────────────────────────────────────────────────
let calDate=new Date();
function renderCalendarTab(){
  const wrap=div("card");
  const year=calDate.getFullYear(),month=calDate.getMonth();
  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const monthName=calDate.toLocaleDateString("en-US",{month:"long",year:"numeric"});
  const todStr=todayStr();
  const active=rentals.filter(r=>r.status!=="cancelled"&&r.status!=="returned");

  const nav=el("div",{style:"display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;"});
  const prev=el("button",{style:"padding:8px 14px;border-radius:8px;border:1px solid #d1d5db;background:#fff;font-size:16px;cursor:pointer;"},["←"]);
  prev.addEventListener("click",()=>{calDate=new Date(year,month-1);renderAdminView();});
  const next=el("button",{style:"padding:8px 14px;border-radius:8px;border:1px solid #d1d5db;background:#fff;font-size:16px;cursor:pointer;"},["→"]);
  next.addEventListener("click",()=>{calDate=new Date(year,month+1);renderAdminView();});
  nav.appendChild(prev);
  nav.appendChild(el("h2",{style:"font-size:22px;"},[monthName]));
  nav.appendChild(next);
  wrap.appendChild(nav);

  const dayHdr=div("cal-grid");
  ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].forEach(d=>{
    dayHdr.appendChild(el("div",{style:"text-align:center;font-size:11px;font-weight:700;color:#6b7280;padding:4px 0;"},[d]));
  });
  wrap.appendChild(dayHdr);

  const grid=div("cal-grid",[],"margin-top:4px;");
  for(let i=0;i<firstDay;i++)grid.appendChild(div(""));
  for(let d=1;d<=daysInMonth;d++){
    const dateStr=`${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const avail=getAvail(dateStr);
    const isToday=dateStr===todStr,isPast=dateStr<todStr;
    const allOut=avail===0,almostOut=avail<=2&&avail>0;
    let bg="#fff",dotColor="#2D6A2D";
    if(isPast){bg="#f9fafb";dotColor=null;}
    else if(allOut){bg="#fef2f2";dotColor="#dc2626";}
    else if(almostOut){bg="#fffbeb";dotColor="#d97706";}
    const cell=el("div",{style:`padding:8px 4px;border-radius:8px;background:${isToday?"#f0f7f0":bg};border:${isToday?"2px solid #2D6A2D":"1px solid #f3f4f6"};text-align:center;min-height:52px;`});
    cell.appendChild(el("div",{style:`font-size:13px;font-weight:${isToday?700:500};color:${isToday?"#2D6A2D":isPast?"#d1d5db":"#1a1a1a"};`},[String(d)]));
    if(!isPast)cell.appendChild(el("div",{style:`font-size:11px;font-weight:700;color:${dotColor};margin-top:2px;`},[allOut?"Full":`${avail}/7`]));
    grid.appendChild(cell);
  }
  wrap.appendChild(grid);

  const legend=el("div",{style:"display:flex;gap:16px;margin-top:16px;flex-wrap:wrap;"});
  [{c:"#2D6A2D",l:"Available"},{c:"#d97706",l:"Almost full"},{c:"#dc2626",l:"Fully booked"}].forEach(({c,l})=>{
    const item=el("div",{style:"display:flex;align-items:center;gap:6px;"});
    item.appendChild(el("div",{style:`width:10px;height:10px;border-radius:50%;background:${c};`}));
    item.appendChild(el("span",{style:"font-size:12px;color:#6b7280;"},[l]));
    legend.appendChild(item);
  });
  wrap.appendChild(legend);
  return wrap;
}

// ── START ──────────────────────────────────────────────────────────────────
renderCustomerView();
